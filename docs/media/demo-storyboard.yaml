# Demo storyboard for sat-centres-workflow
# Used by: bash scripts/generate-media.sh --storyboard docs/media/demo-storyboard.yaml
#
# This project is a terminal CLI, so each "step" captures a terminal state.
# Run `python main.py --full` in a recording tool (e.g. asciinema, vhs, or terminalizer)
# following this script, then export to GIF.
#
# Recommended tools:
#   • VHS (https://github.com/charmbracelet/vhs)  — simplest, pure-bash scriptable
#   • asciinema + agg  — richer playback, exports to animated GIF
#   • terminalizer     — Node-based, YAML config

title: "sat-centres-workflow demo"
output: "docs/media/demo.gif"
resolution: "1280x720"
font_size: 14
theme: "Dracula"

steps:
  - label: "01 - show help"
    command: "python main.py --help"
    wait_ms: 1500

  - label: "02 - run normalize (pre-downloaded data)"
    command: "python main.py --normalize"
    wait_ms: 2000

  - label: "03 - run geocode (short sample)"
    command: "python main.py --geocode --workers 2"
    wait_ms: 3000

  - label: "04 - run validate"
    command: "python main.py --validate"
    wait_ms: 1500

  - label: "05 - show report output"
    command: "python main.py --reports && cat datasets/sat/reports/summary.md | head -30"
    wait_ms: 2000

